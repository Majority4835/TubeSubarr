services:
  tubsubarr:
    image: tubesubarr:local
    environment:
      PORT: 4000
      DATABASE_URL: file:/app/prisma/dev.db
      STORE_ROOT: /app/data/store
      VIEW_ROOT: /app/data/views
      TRASH_ROOT: /app/data/trash
      JELLYFIN_BASE_URL: http://jellyfin:8096
      JELLYFIN_API_KEY: change-me
      CHANNEL_POLL_INTERVAL_MS: 300000
      JELLYFIN_SYNC_INTERVAL_MS: 300000
      CLEANUP_INTERVAL_MS: 3600000
      TRASH_RETENTION_HOURS: 24
    ports:
      - target: 4000
        published: 4000
        protocol: tcp
        mode: ingress
    volumes:
      - tubesubarr-data:/app/data
      - tubesubarr-db:/app/prisma
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

volumes:
  tubesubarr-data:
  tubesubarr-db:
